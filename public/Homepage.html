<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
            background-image: url(Physics-Formula-Background.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            height: 100vh;
            margin: 0;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(156, 156, 156, 0.7);
            z-index: -1;
        }

        .greeting {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(253, 254, 255, 0);
            padding: 50px;
            border-radius: 30px;
            font-family: 'Courier New', Courier, monospace;
            color: rgb(0, 0, 0);
            text-justify: center
        }
        </style>
    </head>
    <body>
       <div class="greeting">
            <h2> <b> Welcome to PhysiForm </b></h2> <br>
            <p> <b>Your one-stop shop for physics problem-solving!</b> </p>
            <p> <b>Our goal is to teach you the basics of physics and problem solving, that will</b> </p>
            <p> <b>be the basis of more complex concepts.</b> </p>
        </div>
    </body>
</html>
