<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            #star1, #star2, #star3, #star4, #star5 {
    display: inline-block;
    cursor: pointer;
}

#ratingButton {
    background-color: #ffffff;
    color: white;
    padding: 0px 0px;
    border: none;
    cursor: pointer;
}

p {
    font-size: 30px;
    color: black;
}

body {
    font-family: Arial, sans-serif;
}

fieldset {
    border: 2px solid #000000;
    border-radius: 25px;
    height: 90vh;
    width: 50vw;
 
}

ratingSubmit {
    background-color: #2baaff;
    color: rgb(27, 126, 255);
    padding: 5px 5px;
    border: 1px;
    cursor: pointer;
}
        </style>
    </head>
    <body>
        <form>
            <fieldset>
                <h2>Add Movie</h2> <br> <br>
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required> <br><br>

                <label for="year">Year</label>
                <input type="number" id="year" name="year" required> <br><br>

                <label for="genre">Genre</label>
                <select id="genre" name="genre" required> <br><br>
                    <option value="action"> Action </option>
                    <option value="comedy"> Comedy </option>
                    <option value="drama"> Drama </option>
                    <option value="horror"> Horror </option>
                    <option value="sci-fi"> Sci-Fi </option>
                    <option value="romance"> Romance </option>
                </select>

                <br><br>

                <h4> *Lowest rating: 1/5 stars </h4>

                <div id="star1" onclick="rateMovie1()">
                    <p> ✩ </p>
                </div>
                <div id="star2" onclick="rateMovie2()">
                    <p> ✩ </p>
                </div>
                <div id="star3" onclick="rateMovie3()">
                    <p> ✩ </p>
                </div>
                <div id="star4" onclick="rateMovie4()">
                    <p> ✩ </p>
                </div>
                <div id="star5" onclick="rateMovie5()">
                    <p> ✩ </p>
                </div> 

                <br><br>

                <button id="ratingSubmit" type="submit" onclick="savePrint(event)"> Rate Movie </button>

                <br><br>

                <h3> Movie List </h3>

                <div id="movieList">
                    <!-- Movie list displayed here -->
                </div>
            </fieldset>
        </form>

        <script>
            const ratingElement = [
    document.getElementById("star1"),
    document.getElementById("star2"),
    document.getElementById("star3"),
    document.getElementById("star4"),
    document.getElementById("star5")
];

const movieListElement = document.getElementById("movieList");
let rating = 0;


function updateStars() {
    for (let i = 0; i < 5; i++) {
        ratingElement[i].querySelector("p").textContent =
            i < rating ? "⭐" : "✩";
    }
}

function setRating(value) {
    rating = value;
    updateStars();
}

function rateMovie1() { setRating(1); }
function rateMovie2() { setRating(2); }
function rateMovie3() { setRating(3); }
function rateMovie4() { setRating(4); }
function rateMovie5() { setRating(5); }

function addMovieToList(movie, index) {
    const movieEntry = document.createElement("div");
    movieEntry.className = "movie-entry";

    const avgRating = (movie.totalRating / movie.ratingCount).toFixed(1);
    const stars =
        "⭐".repeat(Math.round(avgRating)) +
        "✩".repeat(5 - Math.round(avgRating));

    movieEntry.innerHTML = `
        ${movie.title} (${movie.year}) - ${movie.genre},
        Rating: ${stars}
        <button onclick="deleteMovie(${index})">Delete</button>
    `;

    movieListElement.appendChild(movieEntry);
}

function renderMovieList() {
    movieListElement.innerHTML = "";
    const movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach((movie, index) => {
        addMovieToList(movie, index);
    });
}


function savePrint(event) {
    event.preventDefault();

    const title = document.getElementById("title").value.trim();
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;

    if (!title || !year || !genre || rating === 0) {
        alert("Please fill all fields and select a rating.");
        return;
    }

    const movies = JSON.parse(localStorage.getItem("movies")) || [];


    const existingMovie = movies.find(
        movie => movie.title.toLowerCase() === title.toLowerCase()
    );

    if (existingMovie) {
        existingMovie.totalRating += rating;
        existingMovie.ratingCount += 1;
    } else {
        // ADD NEW MOVIE
        movies.push({
            title: title,
            year: parseInt(year),
            genre: genre,
            totalRating: rating,
            ratingCount: 1
        });
    }

    localStorage.setItem("movies", JSON.stringify(movies));
    renderMovieList();

    alert("Movie rated and saved!");

    document.getElementById("title").value = "";
    document.getElementById("year").value = "";
    document.getElementById("genre").value = "action";
    rating = 0;
    updateStars();
}


function deleteMovie(index) {
    const confirmDelete = confirm("Are you sure you want to delete?");
    if (confirmDelete) {
        const movies = JSON.parse(localStorage.getItem("movies")) || [];
        movies.splice(index, 1);   // removes ONE movie
        localStorage.setItem("movies", JSON.stringify(movies));
        renderMovieList();
    }
}
        </script>
    </body>
</html>
